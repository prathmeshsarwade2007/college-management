<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIET – Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a227; --gold-light: #f0c040;
    --dark-bg: #0d0f1a; --card-bg: rgba(18,22,40,0.85);
    --border: rgba(201,162,39,0.25); --input-bg: rgba(255,255,255,0.06);
    --input-border: rgba(201,162,39,0.3); --text: #e8e0cc; --muted: rgba(232,224,204,0.5);
  }
  body {
    min-height: 100vh; background: var(--dark-bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif; overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: -50%;
    background: radial-gradient(ellipse at 20% 20%, rgba(201,162,39,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(60,80,180,0.12) 0%, transparent 60%);
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse { 0% { transform: scale(1); } 100% { transform: scale(1.1) rotate(3deg); } }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(201,162,39,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,162,39,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  .card {
    position: relative; z-index: 10; width: 460px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 40px 40px;
    backdrop-filter: blur(24px);
    box-shadow: 0 0 0 1px rgba(201,162,39,0.1), 0 32px 80px rgba(0,0,0,0.6);
    animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  .card::before {
    content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .logo-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:36px; }
  .logo-img-wrap {
    width:110px; height:110px; border-radius:50%; background:rgba(0,0,0,0.5);
    border: 2px solid rgba(201,162,39,0.4);
    box-shadow: 0 0 0 6px rgba(201,162,39,0.06), 0 8px 32px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .logo-img-wrap img { width:100%; height:100%; object-fit:cover; }
  .brand-name { font-family:'Cinzel',serif; font-size:28px; font-weight:900; letter-spacing:6px; color:var(--gold-light); text-shadow:0 0 20px rgba(201,162,39,0.4); }
  .brand-sub { font-size:13px; font-weight:500; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:-10px; }
  .form-group { margin-bottom:20px; }
  label { display:block; font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  input[type="text"], input[type="password"] {
    width:100%; padding:14px 18px; background:var(--input-bg);
    border:1px solid var(--input-border); border-radius:8px;
    color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:500; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color:var(--gold); background:rgba(255,255,255,0.09); box-shadow:0 0 0 3px rgba(201,162,39,0.15); }
  input::placeholder { color:rgba(232,224,204,0.25); }
  .error-msg {
    background: rgba(220,50,50,0.12); border: 1px solid rgba(220,50,50,0.3);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
    color: #ff7b7b; font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .btn {
    width:100%; padding:15px; margin-top:8px;
    background:linear-gradient(135deg, #c9a227 0%, #f0c040 50%, #c9a227 100%);
    background-size:200% 200%; border:none; border-radius:8px;
    color:#0d0f1a; font-family:'Cinzel',serif; font-size:15px; font-weight:700;
    letter-spacing:3px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
    transition:transform 0.15s, box-shadow 0.3s;
    box-shadow:0 4px 20px rgba(201,162,39,0.3);
  }
  .btn:hover { box-shadow:0 6px 30px rgba(201,162,39,0.5); transform:translateY(-1px); }
  .btn:active { transform:translateY(0); }
  .hint {
    margin-top:20px; padding:12px 16px; border:1px solid rgba(201,162,39,0.15);
    border-radius:8px; background:rgba(201,162,39,0.04);
    display:flex; align-items:center; gap:10px;
    font-size:13px; font-weight:500; color:var(--muted); letter-spacing:0.5px;
  }
  .hint strong { color:var(--gold-light); }
</style>
</head>
