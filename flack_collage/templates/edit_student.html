{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><i class="bi bi-pencil-fill me-2"></i>Edit Student</div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ student.name }}" required/>
          </div>
          <div class="mb-3">
            <label>Department</label>
            <select name="department" class="form-select">
              {% for dept in ['Computer Engineering','Information Technology','Mechanical Engineering','Civil Engineering','Electrical Engineering','Electronics & Telecom'] %}
              <option {% if student.department==dept %}selected{% endif %}>{{ dept }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label>Year</label>
            <select name="year" class="form-select">
              <option value="1" {% if student.year==1 %}selected{% endif %}>1st Year</option>
              <option value="2" {% if student.year==2 %}selected{% endif %}>2nd Year</option>
              <option value="3" {% if student.year==3 %}selected{% endif %}>3rd Year</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Roll Number</label>
            <input type="text" name="roll_no" class="form-control" value="{{ student.roll_no }}" required/>
          </div>
          <!-- ✅ NEW: Enrollment Number field (pre-filled from database) -->
          <div class="mb-4">
            <label>Enrollment Number</label>
            <input type="text" name="enrollment_no" class="form-control" value="{{ student.enrollment_no or '' }}" placeholder="e.g. ENR2024001" required/>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Update</button>
            <a href="{{ url_for('students') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
